<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Manager - 日志</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Ctext x='16' y='24' font-size='20' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3EP%3C/text%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../shared-styles.css">
</head>
<style>
/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family);
  background: var(--color-bg-secondary);
  color: var(--color-text);
  line-height: 1.6;
  display: flex;
  min-height: 100vh;
  overflow: hidden;
}

/* ============================================
   Mobile Menu Button
   ============================================ */
.mobile-menu-btn {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-md);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--color-text);
}

/* ============================================
   Sidebar Overlay (mobile)
   ============================================ */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 90;
}

/* ============================================
   Sidebar
   ============================================ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--color-bg);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
  z-index: 100;
}

/* Unified sidebar-header (Rule 1) */
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-header .logo-icon {
  width: 36px;
  height: 36px;
  background: var(--color-primary);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}

.sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: -0.2px;
  line-height: 1.2;
}

/* Sidebar Navigation */
.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-section-label {
  padding: 8px 12px 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--color-text-secondary);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition-fast);
  user-select: none;
  gap: 10px;
  position: relative;
  text-decoration: none;
}

.nav-item:hover {
  background: var(--color-bg-secondary);
  color: var(--color-text);
}

.nav-item.active {
  background: var(--color-primary-light);
  color: var(--color-primary);
  font-weight: 600;
}

.nav-item .nav-icon {
  font-size: 16px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

/* Sidebar Footer */
.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--color-border);
}

.sidebar-footer .version-info {
  font-size: 11px;
  color: var(--color-text-tertiary);
  text-align: center;
  line-height: 1.5;
}

.sidebar-footer .btn-logout {
  display: block;
  margin-top: 8px;
  width: 100%;
  padding: 6px 0;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-family);
  color: var(--color-error);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.sidebar-footer .btn-logout:hover {
  background: var(--color-error-light);
  border-color: var(--color-error);
}

/* ============================================
   Main Content
   ============================================ */
.main {
  flex: 1;
  overflow-y: auto;
  padding: var(--main-padding);
  min-width: 0;
}

/* ============================================
   Page Header
   ============================================ */
.page-header {
  margin-bottom: 28px;
}

.page-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.page-subtitle {
  font-size: 13px;
  color: var(--color-text-secondary);
  font-weight: 400;
}

/* ============================================
   Banners
   ============================================ */
.offline-banner {
  background: var(--color-warning-light);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #92400e;
  font-weight: 500;
}

.offline-banner.hidden { display: none; }
.offline-banner-icon { font-size: 16px; flex-shrink: 0; }

/* ============================================
   Filter Bar
   ============================================ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.filter-bar .filter-group {
  display: flex;
  align-items: center;
}

.filter-spacer {
  flex: 1;
}

.log-count {
  font-size: 12px;
  color: var(--color-text-tertiary);
  font-weight: 500;
  white-space: nowrap;
}

.time-range-btn {
  font-size: 11px;
  padding: 4px 10px;
}

.time-range-btn.active {
  background: var(--color-primary);
  color: white;
  border-color: var(--color-primary);
}

.time-range-btn.active:hover {
  background: var(--color-primary-hover);
}

/* ============================================
   Log Viewer
   ============================================ */
.log-viewer {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--color-text-secondary);
  min-height: 400px;
  max-height: calc(100vh - 280px);
}

.log-viewer::-webkit-scrollbar {
  width: 8px;
}

.log-viewer::-webkit-scrollbar-track {
  background: transparent;
}

.log-viewer::-webkit-scrollbar-thumb {
  background: var(--color-border);
  border-radius: 4px;
}

.log-viewer::-webkit-scrollbar-thumb:hover {
  background: var(--color-text-tertiary);
}

.log-viewer .log-line {
  display: block;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  transition: background var(--transition-fast);
}

.log-viewer .log-line:hover {
  background: var(--color-bg-secondary);
}

.log-viewer .timestamp {
  color: var(--color-text-tertiary);
}

.log-viewer .proxy-tag {
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.log-viewer .proxy-tag.codex {
  background: #ede9fe;
  color: #7c3aed;
}

.log-viewer .proxy-tag.hermes {
  background: #fef3c7;
  color: #d97706;
}

.log-viewer .proxy-tag.cursor {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.log-viewer .proxy-tag.system {
  background: var(--color-bg-secondary);
  color: var(--color-text-secondary);
}

.log-viewer .level-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.3px;
}

.log-viewer .level-badge.INFO {
  background: var(--color-info-light);
  color: #1e40af;
}

.log-viewer .level-badge.WARN {
  background: var(--color-warning-light);
  color: #92400e;
}

.log-viewer .level-badge.ERROR {
  background: var(--color-error-light);
  color: #991b1b;
}

.log-viewer .log-message {
  color: var(--color-text);
  font-weight: 400;
}

.log-viewer .empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-text-tertiary);
  font-family: var(--font-family);
  font-size: 14px;
}

.log-viewer .empty-state small {
  display: block;
  margin-top: 4px;
  font-size: 12px;
}

.log-viewer .loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--color-text-tertiary);
  font-family: var(--font-family);
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 768px) {
  .mobile-menu-btn {
    display: flex;
  }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    transform: translateX(-100%);
    transition: transform var(--transition-normal);
    box-shadow: var(--shadow-lg);
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay.show {
    display: block;
  }

  .main {
    padding: 72px 20px 20px;
  }

  .filter-bar {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }

  .filter-bar .filter-group {
    width: 100%;
  }

  .filter-bar .form-select,
  .filter-bar .form-input {
    width: 100% !important;
  }

  .log-viewer {
    max-height: calc(100vh - 340px);
  }
}

/* ============================================
   Reduced Motion
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
<body>

<!-- Mobile Menu Button -->
<button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
  &#9776;
</button>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <!-- Rule 1: Unified sidebar-header (NO .sidebar-brand) -->
  <div class="sidebar-header">
    <div class="logo-icon">P</div>
    <h1>Proxy Manager</h1>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <div class="nav-section-label">总览</div>
    <div class="nav-item" data-page="dashboard" data-tooltip="概览" tabindex="0">
      <span class="nav-icon">&#128202;</span>
      概览
    </div>

    <div class="nav-section-label" id="proxySectionLabel">代理配置</div>
    <div id="proxyNavItems"></div>

    <div class="nav-section-label">系统</div>
    <div class="nav-item active" data-page="logs" data-tooltip="日志" tabindex="0">
      <span class="nav-icon">&#128221;</span>
      日志
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="version-info" id="sidebarVersion">
      v1.0.0
    </div>
    <button class="btn btn-sm btn-outline" id="darkModeToggle" style="width:100%;margin-top:8px;" title="切换暗色模式">
      &#9789; 暗色模式
    </button>
    <button class="btn-logout" onclick="handleLogout()" title="退出登录">&nbsp;&nbsp;登出&nbsp;&nbsp;</button>
  </div>
</aside>

<!-- Main Content -->
<main class="main" id="mainContent">
  <!-- Offline Banner -->
  <div class="offline-banner hidden" id="offlineBanner">
    <span class="offline-banner-icon">&#9888;</span>
    <span>后端服务未运行，当前显示模拟数据。请确认 Manager 服务已启动。</span>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title">日志</h1>
    <p class="page-subtitle">查看各代理的请求记录和系统事件</p>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <select id="proxyFilter" class="form-select" onchange="applyFilters()">
        <option value="all">全部代理</option>
        <option value="codex">Codex Proxy</option>
        <option value="hermes">Hermes Proxy</option>
        <option value="cursor">Cursor Proxy</option>
      </select>
    </div>

    <div class="filter-group">
      <select id="levelFilter" class="form-select" onchange="applyFilters()">
        <option value="all">全部级别</option>
        <option value="INFO">INFO</option>
        <option value="WARN">WARN</option>
        <option value="ERROR">ERROR</option>
      </select>
    </div>

    <div class="filter-group">
      <input type="text" id="logSearch" class="form-input" placeholder="搜索日志..." style="width:180px;" oninput="applyFilters()">
    </div>

    <span class="time-range-label" style="font-size:12px;color:var(--color-text-tertiary);font-weight:500;margin-left:4px;">最近:</span>
    <button class="btn btn-sm btn-outline time-range-btn" data-hours="1" onclick="setTimeRange(1)">1小时</button>
    <button class="btn btn-sm btn-outline time-range-btn" data-hours="6" onclick="setTimeRange(6)">6小时</button>
    <button class="btn btn-sm btn-outline time-range-btn" data-hours="24" onclick="setTimeRange(24)">24小时</button>
    <button class="btn btn-sm btn-outline time-range-btn active" data-hours="0" onclick="setTimeRange(0)">全部</button>

    <div class="filter-spacer"></div>

    <button class="btn btn-sm btn-outline" onclick="loadLogs()" id="refreshBtn">
      &#8635; 刷新
    </button>

    <button class="btn btn-sm btn-outline" id="autoRefreshBtn" onclick="toggleAutoRefresh()">
      &#9654; 自动刷新
    </button>

    <button class="btn btn-sm btn-outline" onclick="copyLogs()" title="复制日志">&#9984; 复制</button>

    <span class="log-count" id="logCount"></span>

    <button class="btn btn-sm btn-danger" onclick="clearLogs()">
      &#9855; 清空
    </button>
  </div>

  <!-- Log Viewer -->
  <div class="log-viewer" id="logViewer">
    <div class="empty-state">暂无日志，点击"刷新"加载日志数据。<br><small>也可以点击"自动刷新"开始实时监控。</small></div>
  </div>
</main>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  // ===== Configuration =====
  // PROXY_CONFIGS loaded from utils.js if available, else defined inline (F5)
  var PROXY_CONFIGS = window.PROXY_CONFIGS || {
    codex: { name: 'Codex Proxy', icon: '&#129392;', iconClass: 'codex' },
    hermes: { name: 'Hermes Proxy', icon: '&#9889;', iconClass: 'hermes' },
    cursor: { name: 'Cursor Proxy', icon: '&#9729;', iconClass: 'cursor' }
  };

  // ===== State =====
  var autoRefreshInterval = null;
  var allLogs = [];
  var currentTimeRange = 0;
  var versionCache = {};

  // ===== Offline Banner =====
  function showOfflineBanner() {
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.classList.remove('hidden');
  }

  function hideOfflineBanner() {
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.classList.add('hidden');
  }

  // ===== Time Range Filter =====
  window.setTimeRange = function(hours) {
    currentTimeRange = hours;
    document.querySelectorAll('.time-range-btn').forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.hours) === hours);
    });
    applyFilters();
  };

  // ===== Fetch Logs from API =====
  async function fetchLogs(limit) {
    try {
      var res = await fetch('/api/logs?limit=' + (limit || 500));
      if (res.ok) {
        hideOfflineBanner();
        var data = await res.json();
        return parseRawLogs(data.logs || '');
      }
      throw new Error('not ok');
    } catch (e) {
      showOfflineBanner();
      return [];
    }
  }

  // ===== Parse Raw Log Lines =====
  function parseRawLogs(raw) {
    if (!raw) return [];
    var lines = raw.split('\n').filter(function(l) { return l.trim(); });
    var logs = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var m = line.match(/^\[([^\]]+)\]\s+\[(\w+)\]\s+\[([^\]]+)\]\s+(.*)$/);
      if (m) {
        logs.push({
          timestamp: m[1],
          level: m[2],
          proxy: m[3].toLowerCase(),
          message: m[4]
        });
      } else {
        logs.push({
          timestamp: new Date().toISOString(),
          level: 'INFO',
          proxy: 'system',
          message: line
        });
      }
    }
    return logs;
  }

  // ===== Mock Data (fallback) =====
  function generateMockLogs() {
    var now = Date.now();
    var proxyNames = ['codex', 'hermes', 'cursor'];
    var levels = ['INFO', 'INFO', 'INFO', 'INFO', 'WARN', 'WARN', 'ERROR'];
    var messages = {
      codex: {
        INFO: [
          'Request received: POST /v1/chat/completions',
          'Model switched to gpt-4o, routing mode: fallback',
          'Health check passed, latency: 23ms',
          'Configuration reloaded from config.yaml',
          'Client connected from 127.0.0.1:52341'
        ],
        WARN: [
          'Rate limit approaching: 85% of quota used (425/500)',
          'Retry attempt 2/3 for upstream request, backing off 1.5s',
          'Response time exceeded threshold: 3200ms > 2000ms'
        ],
        ERROR: [
          'Upstream connection refused: codex-api service unavailable',
          'Invalid API key format received from client'
        ]
      },
      hermes: {
        INFO: [
          'Agent loop started, waiting for task queue',
          'Tool execution completed: search_web (duration: 1.2s)',
          'Memory store synced, 47 entries persisted',
          'New session created',
          'WebSocket connection established on proxy channel'
        ],
        WARN: [
          'Task queue depth exceeding threshold: 23 pending tasks',
          'Tool response validation warning: missing field "confidence"',
          'Memory usage at 78%, consider garbage collection'
        ],
        ERROR: [
          'Fatal: agent pipeline interrupted - unrecoverable state',
          'Database connection pool exhausted, max connections: 50'
        ]
      },
      cursor: {
        INFO: [
          'IDE extension connected',
          'Model routing: selected claude-sonnet-4-20250514 (confidence: 0.94)',
          'Cache hit for prompt template: code_completion_v3',
          'Provider balance check: OpenAI $12.47, Anthropic $8.32',
          'Request completed: 142 tokens input, 387 tokens output'
        ],
        WARN: [
          'Provider response slow: anthropic took 4.2s (threshold: 3s)',
          'Token budget warning: current session using 62% of daily limit',
          'Fallback activated: switching from claude-opus to claude-sonnet'
        ],
        ERROR: [
          'Provider error: OpenAI returned 429 Too Many Requests',
          'Model initialization failed: claude-haiku-3 not available in region'
        ]
      }
    };

    var logs = [];
    var count = 25;
    for (var i = 0; i < count; i++) {
      var proxy = proxyNames[Math.floor(Math.random() * proxyNames.length)];
      var level = levels[Math.floor(Math.random() * levels.length)];
      var msgs = messages[proxy][level];
      var msg = msgs[Math.floor(Math.random() * msgs.length)];
      var timestamp = new Date(now - (count - i) * 30000 + Math.random() * 15000);
      logs.push({
        timestamp: timestamp.toISOString().replace('T', ' ').substring(0, 23),
        proxy: proxy,
        level: level,
        message: msg
      });
    }
    return logs.sort(function(a, b) { return a.timestamp.localeCompare(b.timestamp); });
  }

  // ===== Render Log Line =====
  function renderLogLine(log) {
    var ts = window.esc(log.timestamp);
    var proxyName = window.esc(PROXY_CONFIGS[log.proxy] ? PROXY_CONFIGS[log.proxy].name : log.proxy.toUpperCase());
    var msg = window.esc(log.message);
    var proxyClass = log.proxy in PROXY_CONFIGS ? log.proxy : 'system';

    return '<span class="log-line" title="点击复制日志内容">' +
      '<span class="timestamp">' + ts + '</span> ' +
      '<span class="proxy-tag ' + proxyClass + '">[' + proxyName + ']</span> ' +
      '<span class="level-badge ' + window.esc(log.level) + '">' + window.esc(log.level) + '</span> ' +
      '<span class="log-message">' + msg + '</span>' +
      '</span>';
  }

  // ===== Render Logs =====
  function renderLogs(logsToRender, totalCount, autoScroll) {
    var viewer = document.getElementById('logViewer');
    var countEl = document.getElementById('logCount');

    if (logsToRender.length === 0) {
      if (allLogs.length === 0) {
        viewer.innerHTML = '<div class="empty-state">暂无日志，点击"刷新"加载日志数据。<br><small>也可以点击"自动刷新"开始实时监控。</small></div>';
      } else if (totalCount > 0) {
        viewer.innerHTML = '<div class="empty-state">无匹配的日志<br><small>试试调整筛选条件或时间范围</small></div>';
      } else {
        viewer.innerHTML = '<div class="empty-state">暂无日志，点击"刷新"加载...</div>';
      }
      countEl.innerHTML = totalCount > 0 ? '共 <strong>' + totalCount + '</strong> 条，显示 0 条' : '';
      return;
    }

    viewer.innerHTML = logsToRender.map(renderLogLine).join('');
    countEl.innerHTML = '共 <strong>' + totalCount + '</strong> 条，显示 <strong>' + logsToRender.length + '</strong> 条';

    // Click-to-copy log lines
    var lines = viewer.querySelectorAll('.log-line');
    for (var i = 0; i < lines.length; i++) {
      lines[i].addEventListener('click', (function(line) {
        return function() {
          var text = line.textContent;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function() {
              window.showToast('日志已复制到剪贴板', 'success', 1500);
            });
          }
        };
      })(lines[i]));
    }

    // Auto-scroll on initial load or auto-refresh
    if (autoScroll) {
      viewer.scrollTop = viewer.scrollHeight;
    }
  }

  // ===== Filtering =====
  window.applyFilters = function() {
    var proxyFilter = document.getElementById('proxyFilter').value;
    var levelFilter = document.getElementById('levelFilter').value;
    var searchTerm = document.getElementById('logSearch').value.toLowerCase();

    var filtered = allLogs;

    // Apply time range filter
    if (currentTimeRange > 0) {
      var cutoff = Date.now() - currentTimeRange * 3600 * 1000;
      filtered = filtered.filter(function(log) {
        return new Date(log.timestamp).getTime() >= cutoff;
      });
    }

    if (proxyFilter !== 'all') {
      filtered = filtered.filter(function(l) { return l.proxy === proxyFilter; });
    }

    if (levelFilter !== 'all') {
      filtered = filtered.filter(function(l) { return l.level === levelFilter; });
    }

    if (searchTerm) {
      filtered = filtered.filter(function(l) { return l.message.toLowerCase().indexOf(searchTerm) !== -1; });
    }

    renderLogs(filtered, allLogs.length, false);
  };

  // ===== Load Logs =====
  window.loadLogs = function() {
    var viewer = document.getElementById('logViewer');
    viewer.innerHTML = '<div class="loading"><span class="loading-spinner"></span> 加载中...</div>';

    fetchLogs(500).then(function(logs) {
      if (logs.length === 0) {
        logs = generateMockLogs();
        showOfflineBanner();
      }
      allLogs = logs;
      applyFilters();

      var logViewer = document.getElementById('logViewer');
      if (logViewer) logViewer.scrollTop = logViewer.scrollHeight;
    }).catch(function() {
      allLogs = generateMockLogs();
      showOfflineBanner();
      applyFilters();
    });
  };

  // ===== Clear Logs =====
  window.clearLogs = function() {
    if (!confirm('确定要清除所有日志吗？')) return;
    fetch('/api/logs/clear', { method: 'POST' }).catch(function() {});
    allLogs = [];
    document.getElementById('logViewer').innerHTML = '<div class="empty-state">日志已清除</div>';
    document.getElementById('logCount').innerHTML = '共 <strong>0</strong> 条';
    window.showToast('日志已清除', 'success');
  };

  // ===== Copy Logs =====
  window.copyLogs = function() {
    var proxyFilter = document.getElementById('proxyFilter').value;
    var levelFilter = document.getElementById('levelFilter').value;
    var searchTerm = document.getElementById('logSearch').value.toLowerCase();
    var filtered = allLogs;

    if (currentTimeRange > 0) {
      var cutoff = Date.now() - currentTimeRange * 3600 * 1000;
      filtered = filtered.filter(function(log) { return new Date(log.timestamp).getTime() >= cutoff; });
    }
    if (proxyFilter !== 'all') filtered = filtered.filter(function(l) { return l.proxy === proxyFilter; });
    if (levelFilter !== 'all') filtered = filtered.filter(function(l) { return l.level === levelFilter; });
    if (searchTerm) filtered = filtered.filter(function(l) { return l.message.toLowerCase().indexOf(searchTerm) !== -1; });

    var text = filtered.map(function(log) {
      return '[' + log.timestamp + '] [' + log.proxy.toUpperCase() + '] [' + log.level + '] ' + log.message;
    }).join('\n');

    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        window.showToast('已复制 ' + filtered.length + ' 条日志到剪贴板', 'success');
      });
    }
  };

  // ===== Export Logs =====
  window.exportLogs = function(format) {
    var proxyFilter = document.getElementById('proxyFilter').value;
    var levelFilter = document.getElementById('levelFilter').value;
    var searchTerm = document.getElementById('logSearch').value.toLowerCase();
    var filtered = allLogs;

    if (currentTimeRange > 0) {
      var cutoff = Date.now() - currentTimeRange * 3600 * 1000;
      filtered = filtered.filter(function(log) { return new Date(log.timestamp).getTime() >= cutoff; });
    }
    if (proxyFilter !== 'all') filtered = filtered.filter(function(l) { return l.proxy === proxyFilter; });
    if (levelFilter !== 'all') filtered = filtered.filter(function(l) { return l.level === levelFilter; });
    if (searchTerm) filtered = filtered.filter(function(l) { return l.message.toLowerCase().indexOf(searchTerm) !== -1; });

    if (filtered.length === 0) {
      window.showToast('没有可导出的日志', 'error');
      return;
    }

    var content, mimeType, extension;
    if (format === 'csv') {
      var csvRows = ['Timestamp,Proxy,Level,Message'];
      for (var i = 0; i < filtered.length; i++) {
        var row = filtered[i];
        var msgEscaped = (row.message || '').replace(/"/g, '""');
        csvRows.push([row.timestamp, row.proxy.toUpperCase(), row.level, '"' + msgEscaped + '"'].join(','));
      }
      content = csvRows.join('\n');
      mimeType = 'text/csv';
      extension = 'csv';
    } else {
      var txtLines = filtered.map(function(log) {
        return '[' + log.timestamp + '] [' + log.proxy.toUpperCase() + '] [' + log.level + '] ' + log.message;
      });
      content = txtLines.join('\n');
      mimeType = 'text/plain';
      extension = 'txt';
    }

    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'logs-' + new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-') + '.' + extension;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    window.showToast('已导出 ' + filtered.length + ' 条日志 (' + extension.toUpperCase() + ')', 'success');
  };

  // ===== Toggle Auto Refresh =====
  window.toggleAutoRefresh = function() {
    var btn = document.getElementById('autoRefreshBtn');

    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
      btn.innerHTML = '&#9654; 自动刷新';
      btn.classList.remove('active');
    } else {
      loadLogs();
      autoRefreshInterval = setInterval(loadLogs, 5000);
      btn.innerHTML = '&#9632; 停止刷新';
      btn.classList.add('active');
    }
  };

  // ===== Navigation =====
  document.getElementById('sidebarNav').addEventListener('click', function(e) {
    var navItem = e.target.closest('.nav-item');
    if (!navItem) return;
    if (navItem.classList.contains('proxy-nav-item')) {
      window.closeMobileSidebar();
      return;
    }
    var pageId = navItem.dataset.page;
    if (pageId) {
      var pages = document.querySelectorAll('.page');
      for (var i = 0; i < pages.length; i++) {
        pages[i].classList.remove('active');
      }
      var navItems = document.querySelectorAll('.nav-item');
      for (var j = 0; j < navItems.length; j++) {
        navItems[j].classList.remove('active');
      }
      var nav = document.querySelector('.nav-item[data-page="' + pageId + '"]');
      if (nav) nav.classList.add('active');
      window.closeMobileSidebar();
    }
  });

  // ===== Mock Version Data =====
  function getMockVersion() {
    return window.getMockVersion();
  }

  // ===== Initialize =====
  function init() {
    window.initDarkMode();
    window.initMobileSidebar();
    // Load version info
    fetch('/api/version')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        versionCache = data;
        var sidebarVer = document.getElementById('sidebarVersion');
        if (sidebarVer && data && data.version) {
          sidebarVer.textContent = 'Manager ' + data.version;
        }
      })
      .catch(function() {
        var ver = getMockVersion();
        versionCache = ver;
        var sidebarVer = document.getElementById('sidebarVersion');
        if (sidebarVer) sidebarVer.textContent = 'Manager ' + ver.version;
      });

    // Load dynamic proxy nav
    fetch('/api/installed')
      .then(function(res) {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(function(names) {
        if (names && names.length > 0) window.renderDynamicProxyNav(names, PROXY_CONFIGS);
        else throw new Error();
      })
      .catch(function() {
        window.renderDynamicProxyNav(Object.keys(PROXY_CONFIGS), PROXY_CONFIGS);
      });

    // Load logs
    loadLogs();
  }

  init();
})();
</script>
<!-- Shared JS libraries -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/toast.js"></script>
<script src="js/sidebar.js"></script>
</body>
