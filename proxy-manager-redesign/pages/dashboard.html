<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Manager - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Ctext x='16' y='24' font-size='20' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3EP%3C/text%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../shared-styles.css">
</head>
<style>
/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family);
  background: var(--color-bg-secondary);
  color: var(--color-text);
  line-height: 1.6;
  display: flex;
  min-height: 100vh;
  overflow: hidden;
}

/* ============================================
   Mobile Menu Button
   ============================================ */
.mobile-menu-btn {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-md);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--color-text);
}

/* ============================================
   Sidebar Overlay (mobile)
   ============================================ */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 90;
}

/* ============================================
   Sidebar
   ============================================ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--color-bg);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
  z-index: 100;
}

/* Unified sidebar-header (Rule 1) */
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-header .logo-icon {
  width: 36px;
  height: 36px;
  background: var(--color-primary);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}

.sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: -0.2px;
  line-height: 1.2;
}

/* Sidebar Navigation */
.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-section-label {
  padding: 8px 12px 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--color-text-secondary);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition-fast);
  user-select: none;
  gap: 10px;
  position: relative;
  text-decoration: none;
}

.nav-item:hover {
  background: var(--color-bg-secondary);
  color: var(--color-text);
}

.nav-item.active {
  background: var(--color-primary-light);
  color: var(--color-primary);
  font-weight: 600;
}

.nav-item .nav-icon {
  font-size: 16px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.nav-item .nav-badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 10px;
  line-height: 1.5;
}

.nav-badge.running {
  background: var(--color-success-light);
  color: var(--color-success);
}

.nav-badge.stopped {
  background: var(--color-error-light);
  color: var(--color-error);
}

/* Sidebar Footer */
.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--color-border);
}

.sidebar-footer .version-info {
  font-size: 11px;
  color: var(--color-text-tertiary);
  text-align: center;
  line-height: 1.5;
}

.sidebar-footer .btn-logout {
  display: block;
  margin-top: 8px;
  width: 100%;
  padding: 6px 0;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-family);
  color: var(--color-error);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.sidebar-footer .btn-logout:hover {
  background: var(--color-error-light);
  border-color: var(--color-error);
}

/* ============================================
   Nav Tooltip (Rule 11: Global, NOT in media query)
   ============================================ */
.nav-item[data-tooltip] {
  position: relative;
}

.nav-item[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--color-text);
  color: var(--color-bg);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--transition-fast);
  z-index: 150;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

.nav-item[data-tooltip]:hover::after,
.nav-item[data-tooltip]:focus::after {
  opacity: 1;
}

/* ============================================
   Main Content
   ============================================ */
.main {
  flex: 1;
  overflow-y: auto;
  padding: var(--main-padding);
  min-width: 0;
}

/* ============================================
   Page Header
   ============================================ */
.page-header {
  margin-bottom: 28px;
}

.page-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.page-subtitle {
  font-size: 13px;
  color: var(--color-text-secondary);
  font-weight: 400;
}

/* ============================================
   Banners
   ============================================ */
.offline-banner {
  background: var(--color-warning-light);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #92400e;
  font-weight: 500;
}

.offline-banner.hidden { display: none; }
.offline-banner-icon { font-size: 16px; flex-shrink: 0; }

.apikey-banner {
  background: var(--color-warning-light);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #92400e;
  font-weight: 500;
}

.apikey-banner.hidden { display: none; }
.apikey-banner-icon { font-size: 16px; flex-shrink: 0; }

.apikey-banner-close {
  margin-left: auto;
  background: none;
  border: none;
  font-size: 18px;
  color: #92400e;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
  border-radius: 4px;
}

.apikey-banner-close:hover { background: #fef3c7; }

/* ============================================
   Auto-Refresh Control Panel
   ============================================ */
.auto-refresh-panel {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding: 12px 16px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

.auto-refresh-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
}

.toggle-switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--color-border);
  border-radius: 11px;
  transition: all var(--transition-fast);
}

.toggle-slider::before {
  content: '';
  position: absolute;
  height: 16px;
  width: 16px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: all var(--transition-fast);
}

.toggle-switch input:checked + .toggle-slider {
  background: var(--color-primary);
}

.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(18px);
}

.toggle-switch input:focus + .toggle-slider {
  box-shadow: 0 0 0 3px var(--color-primary-bg);
}

/* ============================================
   Stat Cards
   ============================================ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 22px 24px;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}

.stat-card.accent-blue::before {
  background: var(--color-primary);
}

.stat-card.accent-green::before {
  background: var(--color-success);
}

.stat-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.stat-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.stat-label {
  font-size: 12px;
  color: var(--color-text-tertiary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-icon {
  font-size: 20px;
  opacity: 0.6;
}

.stat-value {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-value.blue { color: var(--color-primary); }
.stat-value.green { color: var(--color-success); }

.stat-detail {
  font-size: 12px;
  color: var(--color-text-secondary);
  font-weight: 400;
}

/* ============================================
   Version List
   ============================================ */
.version-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.version-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-sm);
}

.version-item .ver-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
}

.version-item .ver-value {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text);
  background: var(--color-bg);
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--color-border);
}

/* ============================================
   Proxy Cards
   ============================================ */
.proxy-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.proxy-card {
  display: flex;
  align-items: center;
  padding: 18px 22px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-normal);
  gap: 16px;
}

.proxy-card:hover {
  box-shadow: var(--shadow-md);
  border-color: #cbd5e1;
}

.proxy-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.proxy-icon.codex {
  background: #ede9fe;
  color: #7c3aed;
}

.proxy-icon.hermes {
  background: #fef3c7;
  color: #d97706;
}

.proxy-icon.cursor {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.proxy-info {
  flex: 1;
  min-width: 0;
}

.proxy-name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}

.proxy-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text);
}

.proxy-port-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-secondary);
  background: var(--color-bg-secondary);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--color-border);
}

.proxy-version-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--color-primary);
  background: var(--color-primary-light);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(37, 99, 235, 0.15);
}

.proxy-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--color-text-tertiary);
  flex-wrap: wrap;
}

.proxy-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ============================================
   Login Required Card
   ============================================ */
.login-required-container {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 20px;
}

.login-required-card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 40px;
  width: 380px;
  box-shadow: var(--shadow-md);
  text-align: center;
}

.login-required-icon {
  font-size: 36px;
  margin-bottom: 16px;
}

.login-required-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--color-text);
}

.login-required-desc {
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 24px;
}

.login-required-card .btn {
  width: 100%;
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 768px) {
  .mobile-menu-btn {
    display: flex;
  }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    transform: translateX(-100%);
    transition: transform var(--transition-normal);
    box-shadow: var(--shadow-lg);
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay.show {
    display: block;
  }

  .main {
    padding: 72px 20px 20px;
  }

  .stat-grid {
    grid-template-columns: 1fr;
  }

  .proxy-card {
    flex-wrap: wrap;
  }

  .proxy-actions {
    width: 100%;
    justify-content: flex-end;
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--color-border);
  }

  .auto-refresh-panel {
    flex-wrap: wrap;
    gap: 8px;
  }
}

/* ============================================
   Reduced Motion
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
<body>

<!-- Mobile Menu Button -->
<button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
  &#9776;
</button>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <!-- Rule 1: Unified sidebar-header (NO .sidebar-brand) -->
  <div class="sidebar-header">
    <div class="logo-icon">P</div>
    <h1>Proxy Manager</h1>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <div class="nav-section-label">总览</div>
    <div class="nav-item active" data-page="dashboard" data-tooltip="概览" tabindex="0">
      <span class="nav-icon">&#128202;</span>
      概览
    </div>

    <div class="nav-section-label" id="proxySectionLabel">代理配置</div>
    <div id="proxyNavItems"></div>

    <div class="nav-section-label">系统</div>
    <div class="nav-item" data-page="logs" data-tooltip="日志" tabindex="0">
      <span class="nav-icon">&#128221;</span>
      日志
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="version-info" id="sidebarVersion">
      v1.0.0
    </div>
    <button class="btn-logout" onclick="handleLogout()" title="退出登录">&nbsp;&nbsp;登出&nbsp;&nbsp;</button>
  </div>
</aside>

<!-- Main Content -->
<main class="main" id="mainContent">
  <!-- Offline Banner -->
  <div class="offline-banner hidden" id="offlineBanner">
    <span class="offline-banner-icon">&#9888;</span>
    <span>后端服务未运行，当前显示模拟数据。请确认 Manager 服务已启动。</span>
  </div>

  <!-- API Key Banner -->
  <div class="apikey-banner hidden" id="apiKeyBanner">
    <span class="apikey-banner-icon">&#9888;</span>
    <span>部分代理未配置 API Key，功能可能受限。请编辑各模块的 .env 文件。</span>
    <button class="apikey-banner-close" onclick="dismissApiKeyBanner()" aria-label="关闭横幅">&times;</button>
  </div>

  <!-- Dashboard Page -->
  <div class="page active" id="page-dashboard">
    <div class="page-header">
      <h1 class="page-title">概览</h1>
      <p class="page-subtitle">管理所有代理服务的运行状态与控制</p>
    </div>

    <!-- Auto-refresh Control Panel -->
    <div class="auto-refresh-panel" id="autoRefreshPanel">
      <label class="auto-refresh-label" for="autoRefreshToggle">自动刷新</label>
      <label class="toggle-switch">
        <input type="checkbox" id="autoRefreshToggle" checked>
        <span class="toggle-slider"></span>
      </label>
      <label class="auto-refresh-label">间隔</label>
      <select id="autoRefreshInterval">
        <option value="5">5 秒</option>
        <option value="10" selected>10 秒</option>
        <option value="30">30 秒</option>
        <option value="60">60 秒</option>
        <option value="0">关闭</option>
      </select>
    </div>

    <!-- Stat Cards Row -->
    <div class="stat-grid">
      <div class="stat-card accent-blue">
        <div class="stat-card-header">
          <span class="stat-label">代理服务</span>
          <span class="stat-icon">&#9729;</span>
        </div>
        <div class="stat-value blue" id="proxyStatusCount">
          <span class="loading-spinner"></span>
        </div>
        <div class="stat-detail" id="proxyStatusDetail">正在检测...</div>
      </div>
      <div class="stat-card accent-green">
        <div class="stat-card-header">
          <span class="stat-label">已安装代理</span>
          <span class="stat-icon">&#9742;</span>
        </div>
        <div class="stat-value green" id="installedCount">
          <span class="loading-spinner"></span>
        </div>
        <div class="stat-detail" id="installedDetail">正在加载...</div>
      </div>
    </div>

    <!-- Version Info Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">版本信息</div>
        <div class="card-subtitle">系统版本和组件信息</div>
      </div>
      <div class="card-body">
        <div class="version-list" id="versionInfo">
          <div class="version-item">
            <span class="ver-label">管理器版本</span>
            <span class="ver-value"><span class="loading-spinner"></span></span>
          </div>
          <div class="version-item">
            <span class="ver-label">Codex Proxy</span>
            <span class="ver-value"><span class="loading-spinner"></span></span>
          </div>
          <div class="version-item">
            <span class="ver-label">Hermes Proxy</span>
            <span class="ver-value"><span class="loading-spinner"></span></span>
          </div>
          <div class="version-item">
            <span class="ver-label">Cursor Proxy</span>
            <span class="ver-value"><span class="loading-spinner"></span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Proxy Status Cards -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">代理状态</div>
        <div class="card-subtitle">管理各代理服务的运行状态</div>
      </div>
      <div class="card-body">
        <div class="proxy-list" id="proxyStatusList">
          <div class="empty-state">
            <div class="empty-icon">&#128202;</div>
            <div class="empty-text">正在加载代理服务状态...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  // ===== Configuration =====
  var PROXY_CONFIGS = {
    codex: {
      name: 'Codex Proxy',
      icon: '&#129392;',
      iconClass: 'codex',
      port: 18790,
      defaultVersion: 'v1.2.0'
    },
    hermes: {
      name: 'Hermes Proxy',
      icon: '&#9889;',
      iconClass: 'hermes',
      port: 18793,
      defaultVersion: 'v0.9.4'
    },
    cursor: {
      name: 'Cursor Proxy',
      icon: '&#9729;',
      iconClass: 'cursor',
      port: 18794,
      defaultVersion: 'v2.1.0'
    }
  };

  // ===== State =====
  var proxyStatus = {};
  var authToken = sessionStorage.getItem('auth_token');
  var versionCache = {};

  // ===== Toast System (Rule 5: light backgrounds with colored borders) =====
  function showToast(message, type, duration) {
    if (duration === undefined) duration = 3000;
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');

    var icons = { success: '\u2713', error: '\u2717', info: '\u2139\uFE0F' };
    var iconSpan = document.createElement('span');
    iconSpan.textContent = icons[type] || '';
    var msgSpan = document.createElement('span');
    msgSpan.textContent = message;
    toast.appendChild(iconSpan);
    toast.appendChild(msgSpan);

    container.appendChild(toast);

    setTimeout(function() {
      toast.style.animation = 'toast-out 0.3s ease forwards';
      setTimeout(function() { toast.remove(); }, 300);
    }, duration);
  }

  // ===== Navigation =====
  function switchPage(pageId) {
    // Stop status polling when leaving dashboard
    if (pageId !== 'dashboard' && window.__statusInterval) {
      clearInterval(window.__statusInterval);
      window.__statusInterval = null;
    }

    var pages = document.querySelectorAll('.page');
    for (var i = 0; i < pages.length; i++) {
      pages[i].classList.remove('active');
    }
    var navItems = document.querySelectorAll('.nav-item');
    for (var j = 0; j < navItems.length; j++) {
      navItems[j].classList.remove('active');
    }

    var page = document.getElementById('page-' + pageId);
    if (page) page.classList.add('active');

    var nav = document.querySelector('.nav-item[data-page="' + pageId + '"]');
    if (nav) nav.classList.add('active');

    closeMobileSidebar();
  }

  document.getElementById('sidebarNav').addEventListener('click', function(e) {
    var navItem = e.target.closest('.nav-item');
    if (!navItem) return;
    // Handle proxy nav items (anchor elements)
    if (navItem.classList.contains('proxy-nav-item')) return;
    var pageId = navItem.dataset.page;
    if (pageId) {
      switchPage(pageId);
    }
  });

  // ===== Mobile Sidebar =====
  var mobileMenuBtn = document.getElementById('mobileMenuBtn');
  var sidebar = document.getElementById('sidebar');
  var sidebarOverlay = document.getElementById('sidebarOverlay');

  mobileMenuBtn.addEventListener('click', function() {
    sidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('show');
  });

  sidebarOverlay.addEventListener('click', closeMobileSidebar);

  function closeMobileSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('show');
  }

  // ===== Escaping Utility =====
  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ===== Mock Data =====
  function getMockStatus() {
    return {
      codex: {
        running: true,
        port: 18790,
        pid: 12345,
        uptime: '2h 34m',
        health: { status: 'healthy', latency: '45ms' }
      },
      hermes: {
        running: true,
        port: 18793,
        pid: 12346,
        uptime: '2h 34m',
        health: { status: 'healthy', latency: '62ms' }
      },
      cursor: {
        running: false,
        port: 18794,
        pid: null,
        uptime: null,
        health: null
      }
    };
  }

  function getMockVersion() {
    return {
      version: '1.0.3',
      proxies: {
        codex: 'v1.2.0',
        hermes: 'v0.9.4',
        cursor: 'v2.1.0'
      }
    };
  }

  // ===== Dashboard Rendering =====
  function updateDashboardDisplay(versionData) {
    var proxies = Object.entries(proxyStatus);
    var running = proxies.filter(function(entry) { return entry[1].running; }).length;
    var total = proxies.length;

    // Stat cards
    var statusEl = document.getElementById('proxyStatusCount');
    var detailEl = document.getElementById('proxyStatusDetail');
    var installedEl = document.getElementById('installedCount');
    var installedDetailEl = document.getElementById('installedDetail');

    if (statusEl) {
      statusEl.textContent = total > 0 ? running + '/' + total : '0/0';
    }
    if (detailEl) {
      detailEl.textContent = running > 0
        ? running + ' 运行中' + (total - running > 0 ? ', ' + (total - running) + ' 已停止' : '')
        : '暂无代理服务';
    }
    if (installedEl) {
      installedEl.textContent = total;
    }
    if (installedDetailEl) {
      installedDetailEl.textContent = total > 0 ? '已安装代理总数' : '尚未安装任何代理';
    }

    // Render proxy cards
    renderProxyCards(proxies, versionData);

    // Update nav items
    renderProxyNavItems(proxies);
  }

  function renderProxyCards(proxies, versionData) {
    var container = document.getElementById('proxyStatusList');
    if (!container) return;

    if (proxies.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">&#128202;</div>' +
          '<div class="empty-text">暂无代理，请先安装代理程序</div>' +
        '</div>';
      return;
    }

    container.innerHTML = proxies.map(function(entry) {
      var name = entry[0];
      var status = entry[1];
      var config = PROXY_CONFIGS[name] || { name: name, icon: '&#9729;', iconClass: '', port: 0, defaultVersion: '' };
      var isRunning = status.running;
      var statusClass = isRunning ? 'running' : 'stopped';
      var statusText = isRunning ? '运行中' : '未运行';
      var btnClass = isRunning ? 'btn-danger' : 'btn-success';
      var btnText = isRunning ? '停止' : '启动';
      var btnIcon = isRunning ? '\u23F8' : '\u25B6';

      // Rule 10: Unified status badges (pill-shaped with dot + glow)
      var statusBadge = '<span class="status-badge ' + statusClass + '">' +
        '<span class="status-dot"></span>' +
        statusText +
        '</span>';

      var healthBadge = '';
      if (status.health) {
        var healthStatus = status.health.status;
        var healthClass = healthStatus === 'healthy' ? 'status-badge running' : 'status-badge stopped';
        var healthText = healthStatus === 'healthy' ? '健康' : '异常';
        healthBadge = '<span class="' + healthClass + '">' +
          '<span class="status-dot"></span>' +
          healthText +
          '</span>';
      } else if (!isRunning) {
        healthBadge = '<span class="status-badge stopped">' +
          '<span class="status-dot"></span>' +
          '未检测' +
          '</span>';
      }

      var uptimeText = status.uptime ? '运行 ' + status.uptime : '';
      var latencyText = status.health && status.health.latency ? '延迟 ' + status.health.latency : '';

      // Version from version data or config default
      var versionValue = '';
      if (versionData && versionData.proxies && versionData.proxies[name]) {
        versionValue = versionData.proxies[name];
      } else if (config.defaultVersion) {
        versionValue = config.defaultVersion;
      }
      var versionBadge = versionValue ? '<span class="proxy-version-badge">' + esc(versionValue) + '</span>' : '';

      return '<div class="proxy-card" id="proxy-card-' + name + '">' +
        '<div class="proxy-icon ' + config.iconClass + '">' +
          config.icon +
        '</div>' +
        '<div class="proxy-info">' +
          '<div class="proxy-name-row">' +
            '<span class="proxy-name">' + config.name + '</span>' +
            '<span class="proxy-port-badge">:' + (status.port || config.port) + '</span>' +
            versionBadge +
          '</div>' +
          '<div class="proxy-meta">' +
            statusBadge +
            (uptimeText ? '<span>' + esc(uptimeText) + '</span>' : '') +
            (latencyText ? '<span>' + esc(latencyText) + '</span>' : '') +
            healthBadge +
          '</div>' +
        '</div>' +
        '<div class="proxy-actions">' +
          '<button class="btn ' + btnClass + ' btn-sm" id="btn-toggle-' + name + '" onclick="toggleProxy(\'' + name + '\')">' +
            btnIcon + ' ' + btnText +
          '</button>' +
          '<button class="btn btn-outline btn-sm" onclick="window.location.href=\'proxy-config.html?proxy=' + name + '\'">' +
            '配置' +
          '</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function renderProxyNavItems(proxies) {
    var container = document.getElementById('proxyNavItems');
    if (!container) return;

    container.innerHTML = proxies.map(function(entry) {
      var name = entry[0];
      var status = entry[1];
      var config = PROXY_CONFIGS[name] || { name: name, icon: '&#9729;' };
      var badgeClass = status.running ? 'running' : 'stopped';
      var badgeText = status.running ? 'ON' : 'OFF';

      return '<a href="proxy-config.html?proxy=' + name + '" class="nav-item proxy-nav-item" data-proxy="' + esc(name) + '" data-tooltip="' + esc(config.name) + '" tabindex="0">' +
        '<span class="nav-icon">' + config.icon + '</span>' +
        config.name +
        '<span class="nav-badge ' + badgeClass + '">' + badgeText + '</span>' +
        '</a>';
    }).join('');
  }

  // ===== Version Info =====
  function updateVersionDisplay(versionData) {
    var container = document.getElementById('versionInfo');
    var sidebarVer = document.getElementById('sidebarVersion');

    if (container && versionData) {
      var rows = [];
      if (versionData.version) {
        rows.push({ label: '管理器版本', value: versionData.version });
      }
      if (versionData.proxies) {
        Object.keys(versionData.proxies).forEach(function(key) {
          var ver = versionData.proxies[key];
          var config = PROXY_CONFIGS[key];
          rows.push({
            label: config ? config.name : key,
            value: ver
          });
        });
      }

      container.innerHTML = rows.map(function(row) {
        return '<div class="version-item">' +
          '<span class="ver-label">' + row.label + '</span>' +
          '<span class="ver-value">' + row.value + '</span>' +
        '</div>';
      }).join('');
    }

    if (sidebarVer && versionData && versionData.version) {
      sidebarVer.textContent = 'Manager ' + versionData.version;
    }
  }

  // ===== Proxy Control =====
  window.toggleProxy = function(name) {
    var btn = document.getElementById('btn-toggle-' + name);
    if (!btn || btn.disabled) return;
    btn.disabled = true;

    var originalContent = btn.innerHTML;
    btn.innerHTML = '<span class="loading-spinner"></span>';

    var status = proxyStatus[name];
    var action = status && status.running ? 'stop' : 'start';

    fetch('/api/' + action + '/' + name, { method: 'POST' })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          var label = PROXY_CONFIGS[name] ? PROXY_CONFIGS[name].name : name;
          showToast(label + ' 已' + (action === 'start' ? '启动' : '停止'), 'success');
          proxyStatus[name] = Object.assign({}, proxyStatus[name], { running: action === 'start' });
          updateDashboardDisplay(versionCache);
        } else {
          proxyStatus[name] = Object.assign({}, proxyStatus[name], { running: action === 'start' });
          showToast('模拟模式: ' + name + ' 已' + (action === 'start' ? '启动' : '停止'), 'info', 2000);
          updateDashboardDisplay(versionCache);
        }
      })
      .catch(function() {
        proxyStatus[name] = Object.assign({}, proxyStatus[name], { running: !(proxyStatus[name] ? proxyStatus[name].running : false) });
        showToast('演示模式: ' + name + ' 状态已切换', 'info', 2000);
        updateDashboardDisplay(versionCache);
      })
      .finally(function() {
        btn.disabled = false;
      });
  };

  // ===== Data Loading =====
  function loadStatus() {
    fetch('/api/status')
      .then(function(res) {
        if (!res.ok) throw new Error('API not available');
        return res.json();
      })
      .then(function(data) {
        Object.assign(proxyStatus, data);
        updateDashboardDisplay(versionCache);
        hideOfflineBanner();
        hideDemoBanner();
      })
      .catch(function() {
        if (Object.keys(proxyStatus).length === 0) {
          proxyStatus = getMockStatus();
          updateDashboardDisplay(versionCache);
          showOfflineBanner();
        }
      });
  }

  function loadVersion() {
    fetch('/api/version')
      .then(function(res) {
        if (!res.ok) throw new Error('API not available');
        return res.json();
      })
      .then(function(data) {
        versionCache = data;
        updateVersionDisplay(data);
        hideOfflineBanner();
        hideDemoBanner();
      })
      .catch(function() {
        updateVersionDisplay(getMockVersion());
        showOfflineBanner();
      });
  }

  // ===== Offline Banner =====
  function showOfflineBanner() {
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.classList.remove('hidden');
  }

  function hideOfflineBanner() {
    var banner = document.getElementById('offlineBanner');
    if (banner) banner.classList.add('hidden');
  }

  // ===== Demo Banner =====
  function showDemoBanner() {
    var banner = document.getElementById('demoBanner');
    if (banner) banner.classList.remove('hidden');
  }

  function hideDemoBanner() {
    var banner = document.getElementById('demoBanner');
    if (banner) banner.classList.add('hidden');
  }

  function dismissDemoBanner() {
    hideDemoBanner();
  }

  // ===== Dynamic Proxy List =====
  function loadInstalledProxies() {
    return fetch('/api/installed')
      .then(function(res) {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(function(names) {
        if (names && names.length > 0) return names;
        throw new Error();
      })
      .catch(function() {
        return Object.keys(PROXY_CONFIGS);
      });
  }

  // ===== API Key Banner =====
  function showApiKeyBanner() {
    var banner = document.getElementById('apiKeyBanner');
    if (banner) banner.classList.remove('hidden');
  }

  function hideApiKeyBanner() {
    var banner = document.getElementById('apiKeyBanner');
    if (banner) banner.classList.add('hidden');
  }

  function dismissApiKeyBanner() {
    hideApiKeyBanner();
    try {
      localStorage.setItem('apiKeyBannerDismissed', String(Date.now()));
    } catch (e) { /* ignore */ }
  }

  function isApiKeyBannerDismissed() {
    try {
      var ts = localStorage.getItem('apiKeyBannerDismissed');
      if (ts === null) return false;
      return (Date.now() - parseInt(ts, 10)) < 24 * 60 * 60 * 1000;
    } catch (e) {
      return false;
    }
  }

  // ===== Auth Check =====
  function checkAuth() {
    return fetch('/api/auth/status')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.needsSetup && !authToken) {
          showLoginRequired();
          return false;
        }
        return true;
      })
      .catch(function() {
        showOfflineBanner();
        return true;
      });
  }

  function showLoginRequired() {
    var main = document.getElementById('mainContent');
    main.innerHTML =
      '<div class="login-required-container">' +
        '<div class="login-required-card">' +
          '<div class="login-required-icon">&#128274;</div>' +
          '<h2 class="login-required-title">需要登录</h2>' +
          '<p class="login-required-desc">请先配置认证密码后访问管理面板</p>' +
          '<a href="login.html" class="btn btn-primary" style="text-decoration:none;display:inline-block;">去设置密码</a>' +
        '</div>' +
      '</div>';
  }

  // ===== Intercept fetch for auth token =====
  var _origFetch = window.fetch;
  window.fetch = function(url, options) {
    if (options === undefined) options = {};
    if (typeof url === 'string' && url.indexOf('/api/') === 0 && authToken) {
      if (!options.headers) options.headers = {};
      if (typeof options.headers === 'object') {
        options.headers['x-auth-token'] = authToken;
      }
    }
    return _origFetch(url, options);
  };

  // ===== Auto-refresh Control =====
  function getRefreshInterval() {
    var saved = localStorage.getItem('autoRefreshInterval');
    if (saved !== null) return parseInt(saved, 10);
    return 10;
  }

  function saveRefreshInterval(val) {
    localStorage.setItem('autoRefreshInterval', String(val));
  }

  function applyRefreshInterval() {
    var val = parseInt(document.getElementById('autoRefreshInterval').value, 10);
    var toggle = document.getElementById('autoRefreshToggle');

    if (val === 0 || !toggle.checked) {
      if (window.__statusInterval) {
        clearInterval(window.__statusInterval);
        window.__statusInterval = null;
      }
      toggle.checked = false;
      return;
    }

    if (window.__statusInterval) {
      clearInterval(window.__statusInterval);
    }
    window.__statusInterval = setInterval(loadStatus, val * 1000);
    toggle.checked = true;
  }

  // ===== Dynamic Proxy Nav =====
  function renderDynamicProxyNav(proxyNames) {
    var container = document.getElementById('proxyNavItems');
    if (!container) return;
    var label = document.getElementById('proxySectionLabel');
    if (label) label.style.display = proxyNames.length > 0 ? '' : 'none';

    if (proxyNames.length === 0) {
      container.innerHTML = '<div class="nav-item" style="color:var(--color-text-tertiary);font-size:12px;padding:4px 12px;">暂无代理</div>';
      return;
    }

    container.innerHTML = proxyNames.map(function(name) {
      var config = PROXY_CONFIGS[name] || { name: name, icon: '&#9729;', iconClass: '' };
      return '<a href="proxy-config.html?proxy=' + name + '" class="nav-item proxy-nav-item" data-proxy="' + esc(name) + '" data-tooltip="' + esc(config.name) + '" tabindex="0">' +
        '<span class="nav-icon">' + config.icon + '</span>' +
        esc(config.name) +
        '</a>';
    }).join('');
  }

  // ===== Logout =====
  window.handleLogout = function() {
    sessionStorage.removeItem('auth_token');
    window.location.href = 'login.html';
  };

  // ===== Initialize =====
  function init() {
    checkAuth().then(function(authOk) {
      if (!authOk) return;

      loadInstalledProxies().then(function(installedNames) {
        renderDynamicProxyNav(installedNames);
      });

      // Restore saved interval setting
      var savedVal = getRefreshInterval();
      var intervalSelect = document.getElementById('autoRefreshInterval');
      if (intervalSelect) intervalSelect.value = String(savedVal);

      // Load data
      Promise.all([
        new Promise(function(resolve) { loadStatus(); resolve(); }),
        new Promise(function(resolve) { loadVersion(); resolve(); })
      ]).then(function() {
        // Check API Key completeness
        fetch('/api/env-check')
          .then(function(res) { return res.json(); })
          .then(function(envData) {
            if (envData.totalCount > 0 && !isApiKeyBannerDismissed()) {
              showApiKeyBanner();
            }
          })
          .catch(function() { /* skip */ });
      });

      // Start auto-refresh
      applyRefreshInterval();

      // Wire up controls
      var intervalSelectCtrl = document.getElementById('autoRefreshInterval');
      if (intervalSelectCtrl) {
        intervalSelectCtrl.addEventListener('change', function() {
          saveRefreshInterval(parseInt(this.value, 10));
          applyRefreshInterval();
        });
      }
      var toggleCheck = document.getElementById('autoRefreshToggle');
      if (toggleCheck) {
        toggleCheck.addEventListener('change', function() {
          applyRefreshInterval();
        });
      }
    });
  }

  init();
})();
</script>
</body>
</html>
