<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Manager - Login</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Ctext x='16' y='24' font-size='20' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3EP%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    </head>
<body>

<div class="page-container">
  <!-- Branding -->
  <div class="branding">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </div>
    <div class="brand-name">Proxy Manager</div>
    <div class="brand-subtitle">Multi-Proxy Management Console</div>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- ==========================================
         SETUP MODE
         Initial password setup for first-time users
         ========================================== -->
    <div class="mode-setup" id="setupMode">
      <div class="form-header">
        <h1 class="form-title">Set Admin Password</h1>
        <p class="form-description">Create a secure password to protect your proxy management console.</p>
      </div>

      <form id="setupForm" novalidate>
        <div class="error-message" id="setupError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span></span>
        </div>

        <div class="success-message" id="setupSuccess">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>Password set successfully!</span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label" for="setupPassword">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="setupPassword"
              class="input-field"
              placeholder="Enter a strong password"
              autocomplete="new-password"
              required
            />
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" tabindex="0">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="strengthBars">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>

        <!-- Confirm Password Field -->
        <div class="form-group">
          <label class="form-label" for="setupConfirm">Confirm Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="setupConfirm"
              class="input-field"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              required
            />
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" tabindex="0">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="setupSubmit">
          <span class="btn-text">Create Admin Account</span>
          <span class="spinner"></span>
        </button>
      </form>
    </div>

    <!-- ==========================================
         LOGIN MODE
         Existing users authenticate with password
         ========================================== -->
    <div class="mode-login mode-hidden" id="loginMode">
      <div class="form-header">
        <h1 class="form-title">Welcome Back</h1>
        <p class="form-description">Enter your password to access the proxy management console.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="error-message" id="loginError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span></span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="loginPassword"
              class="input-field"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" tabindex="0">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="loginSubmit">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="card-footer">
        <p class="footer-text">Forgot password? <a href="#" id="resetLink">Contact administrator</a></p>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ============================================
  // State Management
  // ============================================
  var state = {
    mode: 'setup'
  };

  // ============================================
  // DOM References
  // ============================================
  var elements = {
    setupMode: document.getElementById('setupMode'),
    loginMode: document.getElementById('loginMode'),
    setupForm: document.getElementById('setupForm'),
    loginForm: document.getElementById('loginForm'),
    setupPassword: document.getElementById('setupPassword'),
    setupConfirm: document.getElementById('setupConfirm'),
    loginPassword: document.getElementById('loginPassword'),
    setupSubmit: document.getElementById('setupSubmit'),
    loginSubmit: document.getElementById('loginSubmit'),
    setupError: document.getElementById('setupError'),
    loginError: document.getElementById('loginError'),
    setupSuccess: document.getElementById('setupSuccess'),
    strengthBars: document.getElementById('strengthBars'),
    strengthText: document.getElementById('strengthText'),
    resetLink: document.getElementById('resetLink')
  };

  // ============================================
  // Utility Functions
  // ============================================
  function showError(container, message) {
    var errorSpan = container.querySelector('.error-message span');
    errorSpan.textContent = message;
    container.classList.add('visible');
  }

  function hideError(container) {
    container.classList.remove('visible');
  }

  function showSuccess(container) {
    container.classList.add('visible');
  }

  function hideSuccess(container) {
    container.classList.remove('visible');
  }

  function setLoading(button, loading) {
    if (loading) {
      button.classList.add('loading');
      button.disabled = true;
    } else {
      button.classList.remove('loading');
      button.disabled = false;
    }
  }

  function switchMode(mode) {
    state.mode = mode;
    if (mode === 'setup') {
      elements.setupMode.classList.remove('mode-hidden');
      elements.loginMode.classList.add('mode-hidden');
    } else {
      elements.setupMode.classList.add('mode-hidden');
      elements.loginMode.classList.remove('mode-hidden');
    }
  }

  // ============================================
  // Password Visibility Toggle
  // ============================================
  var toggles = document.querySelectorAll('.password-toggle');
  for (var i = 0; i < toggles.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var wrapper = this.closest('.input-wrapper');
        var input = wrapper.querySelector('.input-field');
        var eyeOpen = this.querySelector('.eye-open');
        var eyeClosed = this.querySelector('.eye-closed');

        if (input.type === 'password') {
          input.type = 'text';
          eyeOpen.style.display = 'none';
          eyeClosed.style.display = 'block';
        } else {
          input.type = 'password';
          eyeOpen.style.display = 'block';
          eyeClosed.style.display = 'none';
        }
      });
    })(toggles[i]);
  }

  // ============================================
  // Password Strength Calculator
  // ============================================
  function calculateStrength(password) {
    var score = 0;
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[^a-zA-Z0-9]/.test(password)) score++;
    return Math.min(score, 4);
  }

  function updateStrengthUI(strength) {
    var bars = elements.strengthBars.querySelectorAll('.strength-bar');
    var labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    var classes = ['', 'weak', 'weak', 'medium', 'strong'];

    for (var i = 0; i < bars.length; i++) {
      bars[i].className = 'strength-bar';
      if (i < strength) {
        bars[i].classList.add('active', classes[strength]);
      }
    }

    elements.strengthText.textContent = strength > 0 ? labels[strength] : '';
    if (strength <= 1) {
      elements.strengthText.style.color = 'var(--error)';
    } else if (strength === 2 || strength === 3) {
      elements.strengthText.style.color = '#f59e0b';
    } else {
      elements.strengthText.style.color = 'var(--success)';
    }
  }

  if (elements.setupPassword) {
    elements.setupPassword.addEventListener('input', function() {
      var strength = calculateStrength(this.value);
      updateStrengthUI(strength);
    });
  }

  // ============================================
  // Setup Form Handler
  // ============================================
  if (elements.setupForm) {
    elements.setupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      hideError(elements.setupError);
      hideSuccess(elements.setupSuccess);

      var password = elements.setupPassword.value;
      var confirm = elements.setupConfirm.value;

      if (!password || password.length < 8) {
        showError(elements.setupError, 'Password must be at least 8 characters long.');
        return;
      }

      if (password !== confirm) {
        showError(elements.setupError, 'Passwords do not match.');
        elements.setupConfirm.classList.add('error');
        setTimeout(function() {
          elements.setupConfirm.classList.remove('error');
        }, 2000);
        return;
      }

      setLoading(elements.setupSubmit, true);

      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        setLoading(elements.setupSubmit, false);
        if (data.success) {
          sessionStorage.setItem('auth_token', data.token);
          showSuccess(elements.setupSuccess);
          setTimeout(function() {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          showError(elements.setupError, data.error || 'Setup failed. Please try again.');
        }
      })
      .catch(function(err) {
        setLoading(elements.setupSubmit, false);
        showError(elements.setupError, 'Connection error. Please check the server is running.');
        console.error('Setup error:', err);
      });
    });
  }

  // ============================================
  // Login Form Handler
  // ============================================
  if (elements.loginForm) {
    elements.loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      hideError(elements.loginError);

      var password = elements.loginPassword.value;

      if (!password) {
        showError(elements.loginError, 'Please enter your password.');
        return;
      }

      setLoading(elements.loginSubmit, true);

      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        setLoading(elements.loginSubmit, false);
        if (data.success) {
          sessionStorage.setItem('auth_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          showError(elements.loginError, data.error || 'Invalid password. Please try again.');
        }
      })
      .catch(function(err) {
        setLoading(elements.loginSubmit, false);
        showError(elements.loginError, 'Connection error. Please check the server is running.');
        console.error('Login error:', err);
      });
    });
  }

  // ============================================
  // Clear errors on input focus
  // ============================================
  var inputs = document.querySelectorAll('.input-field');
  for (var j = 0; j < inputs.length; j++) {
    (function(input) {
      input.addEventListener('focus', function() {
        this.classList.remove('error');
        var form = this.closest('form');
        if (form) {
          var errorContainer = form.querySelector('.error-message');
          if (errorContainer) hideError(errorContainer);
        }
      });
    })(inputs[j]);
  }

  // ============================================
  // Initialize: Detect mode from backend API
  // ============================================
  fetch('/api/auth/status')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.needsSetup) {
        switchMode('setup');
      } else {
        switchMode('login');
      }
    })
    .catch(function() {
      // Fallback to localStorage if backend unavailable
      var hasPassword = localStorage.getItem('proxyManager_password');
      if (hasPassword) {
        switchMode('login');
      } else {
        switchMode('setup');
      }
    });

})();
</script>

    <style>
/* ============================================
   CSS Custom Properties
   ============================================ */
:root {
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-light: #dbeafe;
  --primary-glow: rgba(37, 99, 235, 0.12);
  --bg: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --text: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --border-focus: #2563eb;
  --success: #10b981;
  --success-light: #d1fae5;
  --error: #ef4444;
  --error-light: #fee2e2;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04), 0 6px 24px rgba(0, 0, 0, 0.06);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-secondary);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* ============================================
   Background Pattern
   ============================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -20%, var(--primary-glow), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(37, 99, 235, 0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, var(--border) 0.5px, transparent 0.5px);
  background-size: 32px 32px;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   Page Container
   ============================================ */
.page-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  animation: fadeInUp 0.6s var(--transition-slow) both;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ============================================
   Branding Area
   ============================================ */
.branding {
  text-align: center;
  margin-bottom: 32px;
}

.brand-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
  position: relative;
}

.brand-icon::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  pointer-events: none;
}

.brand-icon svg {
  width: 24px;
  height: 24px;
  color: white;
}

.brand-name {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

.brand-subtitle {
  font-size: 0.8125rem;
  color: var(--text-tertiary);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* ============================================
   Card
   ============================================ */
.card {
  background: var(--bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: 36px 32px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-hover));
  opacity: 0;
  transition: opacity var(--transition-base);
}

.card:focus-within::before {
  opacity: 1;
}

/* ============================================
   Form Header
   ============================================ */
.form-header {
  margin-bottom: 28px;
}

.form-title {
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}

.form-description {
  font-size: 0.8125rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ============================================
   Form Groups
   ============================================ */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.01em;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-field {
  width: 100%;
  height: 42px;
  padding: 0 44px 0 14px;
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  color: var(--text);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.input-field::placeholder {
  color: var(--text-tertiary);
}

.input-field:hover {
  border-color: #cbd5e1;
}

.input-field:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.input-field.error {
  border-color: var(--error);
}

.input-field.error:focus {
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
}

.input-icon {
  position: absolute;
  left: 14px;
  width: 18px;
  height: 18px;
  color: var(--text-tertiary);
  pointer-events: none;
  transition: color var(--transition-fast);
}

.input-field:focus ~ .input-icon,
.input-field:not(:placeholder-shown) ~ .input-icon {
  color: var(--primary);
}

/* Password toggle button */
.password-toggle {
  position: absolute;
  right: 4px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
  cursor: pointer;
  transition: color var(--transition-fast), background var(--transition-fast);
}

.password-toggle:hover {
  color: var(--text-secondary);
  background: var(--bg-tertiary);
}

.password-toggle svg {
  width: 18px;
  height: 18px;
}

/* ============================================
   Password Strength Indicator
   ============================================ */
.password-strength {
  display: flex;
  gap: 4px;
  margin-top: 8px;
  height: 3px;
}

.strength-bar {
  flex: 1;
  height: 100%;
  background: var(--bg-tertiary);
  border-radius: 2px;
  transition: background var(--transition-base);
}

.strength-bar.active.weak { background: var(--error); }
.strength-bar.active.medium { background: #f59e0b; }
.strength-bar.active.strong { background: var(--success); }

.strength-text {
  font-size: 0.6875rem;
  color: var(--text-tertiary);
  margin-top: 4px;
  transition: color var(--transition-fast);
}

/* ============================================
   Submit Button
   ============================================ */
.btn-submit {
  width: 100%;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  color: white;
  background: var(--primary);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
  margin-top: 24px;
  position: relative;
  overflow: hidden;
}

.btn-submit:hover:not(:disabled) {
  background: var(--primary-hover);
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

.btn-submit:active:not(:disabled) {
  transform: scale(0.985);
}

.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-submit .btn-text {
  transition: opacity var(--transition-fast);
}

.btn-submit.loading .btn-text {
  opacity: 0;
}

.btn-submit .spinner {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.btn-submit.loading .spinner {
  opacity: 1;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================
   Error Message
   ============================================ */
.error-message {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  margin-bottom: 20px;
  background: var(--error-light);
  border: 1px solid rgba(239, 68, 68, 0.15);
  border-radius: var(--radius-sm);
  font-size: 0.8125rem;
  color: var(--error);
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity var(--transition-base), transform var(--transition-base);
  pointer-events: none;
  visibility: hidden;
}

.error-message.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
}

.error-message svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* ============================================
   Success Message
   ============================================ */
.success-message {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  margin-bottom: 20px;
  background: var(--success-light);
  border: 1px solid rgba(16, 185, 129, 0.15);
  border-radius: var(--radius-sm);
  font-size: 0.8125rem;
  color: var(--success);
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity var(--transition-base), transform var(--transition-base);
  pointer-events: none;
  visibility: hidden;
}

.success-message.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
}

.success-message svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* ============================================
   Footer
   ============================================ */
.card-footer {
  margin-top: 24px;
  text-align: center;
}

.footer-text {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  letter-spacing: 0.01em;
}

.footer-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  background: var(--bg-tertiary);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text-secondary);
}

/* ============================================
   Mode Switching
   ============================================ */
.mode-setup,
.mode-login {
  transition: opacity var(--transition-base), transform var(--transition-base);
}

.mode-hidden {
  display: none;
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 480px) {
  body {
    padding: 16px;
    align-items: flex-start;
    padding-top: 12vh;
  }

  .card {
    padding: 28px 24px;
  }

  .branding {
    margin-bottom: 24px;
  }

  .brand-icon {
    width: 44px;
    height: 44px;
  }

  .brand-icon svg {
    width: 22px;
    height: 22px;
  }

  .brand-name {
    font-size: 1.125rem;
  }
}

/* ============================================
   Reduced Motion
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</body>
</html>
